<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="pong.css">
</head>
<body>
    <div class="container">
        <h1>Pong Game</h1>
        <div class="scoreboard">
            <div class="score-player">
                <h2>Player</h2>
                <p id="playerScore">0</p>
            </div>
            <div class="score-separator">vs</div>
            <div class="score-computer">
                <h2>Computer</h2>
                <p id="computerScore">0</p>
            </div>
        </div>
        
        <div class="game-info">
            <p>🖱️ Move mouse vertically to control left paddle</p>
            <p>⬆️⬇️ Or use arrow keys</p>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <button id="startBtn" class="start-btn">Start Game</button>
        <button id="resetBtn" class="reset-btn">Reset Score</button>
    </div>

    <script src="pong.js"></script>
</body>
</html>
